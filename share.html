<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TREE 分享页</title>
    <style>
      :root {
        --bg-a: #f8ecd9;
        --bg-b: #daf2eb;
        --ink: #1f2f34;
        --muted: #597078;
        --line: rgba(31, 47, 52, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at 10% 12%, rgba(241, 174, 107, 0.28), transparent 35%),
          radial-gradient(circle at 85% 86%, rgba(63, 162, 140, 0.24), transparent 36%),
          linear-gradient(150deg, var(--bg-a), var(--bg-b));
        padding: clamp(14px, 3vw, 28px);
      }

      .shell {
        width: min(860px, 100%);
        margin: 0 auto;
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: clamp(16px, 2.8vw, 32px);
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 24px 66px rgba(18, 40, 45, 0.16);
      }

      h1 {
        margin: 0;
        font-size: clamp(26px, 5vw, 40px);
      }

      .sub {
        margin-top: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      .grid {
        margin-top: 16px;
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #fff;
        padding: 12px;
      }

      .label {
        color: var(--muted);
        font-size: 12px;
      }

      .value {
        margin-top: 5px;
        font-size: 24px;
        font-weight: 800;
      }

      .list {
        margin-top: 14px;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 8px;
      }

      .list li {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        padding: 10px 12px;
      }

      .error {
        color: #b42318;
      }

      @media (max-width: 720px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <h1>能力树分享</h1>
      <p id="summaryText" class="sub">正在加载分享数据...</p>
      <section id="statsGrid" class="grid" hidden></section>
      <ul id="detailList" class="list" hidden></ul>
    </main>

    <script type="module" src="./scripts/share.js"></script>
  </body>
</html>
